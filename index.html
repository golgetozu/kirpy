<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kirpi Labirent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="image.png">
<link rel="icon" href="image.png">
<meta name="theme-color" content="#1a1a2e">
<title>Kirpi Labirent</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  font-family: 'Press Start 2P', cursive;
  touch-action: manipulation;
}
html { height: 100%; height: -webkit-fill-available; }
body {
  width: 100%; height: 100vh; height: 100dvh;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a2e; overflow: hidden;
  display: flex; flex-direction: column;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
}

/* ── HUD ── */
.top {
  flex: 0 0 auto; width: 100%; background: #1a1a2e;
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 10px 3px; gap: 6px; min-height: 36px;
}
.hud-left { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; min-width: 55px; }
.hud-lv { color: #f5a623; font-size: 9px; text-shadow: 1px 1px 0 #7a5010; white-space: nowrap; }
.hud-sc { color: #fff; font-size: 9px; white-space: nowrap; }
.hud-center {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
}
.hud-title {
  color: #f5a623; font-size: 10px; text-shadow: 1px 1px 0 #7a5010;
  letter-spacing: 1px; white-space: nowrap; text-align: center; width: 100%;
}
.timer-row {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; width: 100%;
}
.timer-bar-wrap {
  width: 100%; max-width: 110px; height: 8px;
  background: #16213e; border-radius: 3px; border: 1px solid #f5a623;
  overflow: hidden;
}
.timer-bar { height: 100%; background: linear-gradient(90deg,#f5a623,#ff6b00); border-radius: 3px; width: 100%; transition: background 0.5s; }
.timer-sec { color: #f5a623; font-size: 8px; white-space: nowrap; min-width: 20px; text-align: right; }
.hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; min-width: 70px; }
.hud-apples { display: flex; align-items: center; gap: 2px; }
.apple-icon { font-size: 12px; opacity: 0.3; transition: opacity 0.3s; filter: grayscale(100%); line-height: 1; }
.apple-icon.collected { opacity: 1; filter: none; }
.hud-p2sc { color: #ff6ec7; font-size: 8px; white-space: nowrap; }

/* ── GAME AREA ── */
.mid {
  flex: 1; width: 100%; position: relative;
  background: #1a1a2e; display: flex;
  align-items: center; justify-content: center;
  overflow: hidden; min-height: 0;
}
canvas { display: block; touch-action: none; }
.swipe-hint {
  position: absolute; bottom: 4px; left: 50%;
  transform: translateX(-50%); color: rgba(255,255,255,0.12);
  font-size: 7px; pointer-events: none; white-space: nowrap; letter-spacing: 0.5px;
}

/* ── TOKUM FLOAT ── */
.tokum-float {
  position: absolute; pointer-events: none;
  color: #ff4444; font-size: 10px;
  text-shadow: 0 0 8px rgba(255,68,68,0.8);
  animation: tokumAnim 1.5s ease-out forwards;
  z-index: 50; white-space: nowrap;
}
@keyframes tokumAnim {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  50%  { opacity: 1; transform: translateY(-20px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
}

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0; width: 100%;
  height: 100vh; height: 100dvh;
  display: none; flex-direction: column;
  z-index: 99; overflow: hidden; background: #000;
}
.overlay.active { display: flex; }

/* ── ANA EKRAN ── */
#ov { align-items: stretch; }
#bgImage {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  z-index: 0; pointer-events: none; display: block;
}
#loadingSpinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 1; }
.spinner {
  width: 44px; height: 44px;
  border: 4px solid rgba(0,212,255,0.3);
  border-top-color: #00d4ff; border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#settingsBtn {
  position: absolute; top: calc(var(--safe-top) + 14px); left: 16px;
  z-index: 3; width: 36px; height: 36px;
  background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px); transition: transform 0.2s;
}
#settingsBtn:active { transform: scale(0.9); }
.settings-icon { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.main-btn-area {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 24px calc(var(--safe-bottom) + 20px);
  gap: 8px; padding-top: 30px;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 55%, transparent 100%);
}
.main-btn {
  width: 160px; height: 36px; border-radius: 18px;
  font-family: 'Press Start 2P', cursive;
  font-size: 7px; letter-spacing: 1px;
  cursor: pointer; border: none; outline: none;
  transition: transform 0.1s, box-shadow 0.1s;
  position: relative; overflow: hidden;
}
.main-btn:active { transform: scale(0.95); }
.main-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, transparent 60%);
  border-radius: inherit; pointer-events: none;
}
#singleBtn {
  background: linear-gradient(135deg, #00c6ff, #0072ff); color: #fff;
  box-shadow: 0 0 20px rgba(0,114,255,0.5), 0 4px 15px rgba(0,0,0,0.4);
  animation: btnPulse1 2.5s ease-in-out infinite;
}
@keyframes btnPulse1 {
  0%,100% { box-shadow: 0 0 18px rgba(0,114,255,0.5), 0 4px 15px rgba(0,0,0,0.4); }
  50%      { box-shadow: 0 0 30px rgba(0,198,255,0.8), 0 4px 15px rgba(0,0,0,0.4); }
}
#multiBtn {
  background: linear-gradient(135deg, #00ff88, #00c853); color: #003320;
  box-shadow: 0 0 20px rgba(0,200,83,0.5), 0 4px 15px rgba(0,0,0,0.4);
  animation: btnPulse2 2.5s ease-in-out infinite 0.4s;
}
@keyframes btnPulse2 {
  0%,100% { box-shadow: 0 0 18px rgba(0,200,83,0.5), 0 4px 15px rgba(0,0,0,0.4); }
  50%      { box-shadow: 0 0 30px rgba(0,255,136,0.8), 0 4px 15px rgba(0,0,0,0.4); }
}
.mp-sub-btns {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; overflow: hidden; width: 160px;
  max-height: 0; opacity: 0;
  transition: max-height 0.35s ease, opacity 0.3s ease;
}
.mp-sub-btns.open { max-height: 100px; opacity: 1; }
.sub-btn {
  width: 100%; height: 32px; border-radius: 16px;
  font-family: 'Press Start 2P', cursive; font-size: 6px; letter-spacing: 1px;
  cursor: pointer; outline: none; transition: transform 0.1s;
  position: relative; overflow: hidden;
}
.sub-btn:active { transform: scale(0.95); }
.sub-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, transparent 60%);
  border-radius: inherit; pointer-events: none;
}
#quickBtn { background: linear-gradient(135deg,#f5a623,#e67e00); color: #fff; border: none; box-shadow: 0 0 14px rgba(245,166,35,0.45); }
#roomBtn  { background: transparent; color: #00d4ff; border: 1.5px solid #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.2); }

/* ── AYAR ── */
#settings-ov { background: rgba(10,10,30,0.98); align-items: center; justify-content: center; gap: 24px; padding: 40px 24px; }
.settings-title { color: #f5a623; font-size: 13px; text-shadow: 2px 2px 0 #7a5010; letter-spacing: 2px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; width: 240px; gap: 16px; }
.settings-lbl { color: #fff; font-size: 8px; letter-spacing: 1px; }
.toggle { width: 48px; height: 26px; border-radius: 13px; background: #333; border: none; cursor: pointer; position: relative; transition: background 0.3s; flex-shrink: 0; }
.toggle.on { background: #00d4ff; }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
.toggle.on::after { transform: translateX(22px); }
.settings-back { width: 140px; height: 38px; border-radius: 19px; background: transparent; border: 1.5px solid #ff0055; color: #ff0055; font-family: 'Press Start 2P', cursive; font-size: 8px; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; }
.settings-back:active { transform: scale(0.95); }

/* ── ODA ── */
#room-ov { background: rgba(10,10,30,0.98); align-items: center; justify-content: center; padding: calc(var(--safe-top)+16px) 20px calc(var(--safe-bottom)+16px); gap: 14px; }
.room-title { color: #f5a623; font-size: 13px; text-shadow: 2px 2px 0 #7a5010; letter-spacing: 2px; text-align: center; }
.room-sub { color: rgba(255,255,255,0.5); font-size: 7px; text-align: center; line-height: 2.2; letter-spacing: 0.5px; }
.room-input { width: 200px; height: 44px; background: #16213e; border: 2px solid #00d4ff; border-radius: 12px; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 14px; text-align: center; letter-spacing: 4px; outline: none; text-transform: uppercase; }
.room-input::placeholder { color: rgba(255,255,255,0.3); font-size: 9px; letter-spacing: 1px; }
.room-divider { color: rgba(255,255,255,0.2); font-size: 7px; letter-spacing: 2px; }
#room-status { color: #00d4ff; font-size: 7px; text-align: center; min-height: 20px; letter-spacing: 0.5px; line-height: 2; }
.ov-btn { height: 38px; border-radius: 19px; font-family: 'Press Start 2P', cursive; font-size: 8px; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; outline: none; }
.ov-btn:active { transform: scale(0.95); }
.ov-btn-green { width: 200px; background: linear-gradient(135deg,#00ff88,#00c853); color: #003320; border: none; box-shadow: 0 0 12px rgba(0,200,83,0.4); }
.ov-btn-blue  { width: 200px; background: transparent; color: #00d4ff; border: 1.5px solid #00d4ff; }
.ov-btn-red   { width: 140px; background: transparent; color: #ff0055; border: 1.5px solid #ff0055; }

/* ── BEKLEME ── */
#wait-ov { background: rgba(10,10,30,0.98); align-items: center; justify-content: center; padding: 20px; gap: 18px; }
.wait-title { color: #f5a623; font-size: 12px; text-shadow: 2px 2px 0 #7a5010; letter-spacing: 2px; text-align: center; }
.wait-code { background: #16213e; border: 2px solid #f5a623; border-radius: 16px; padding: 12px 24px; text-align: center; }
.wait-code-lbl { color: rgba(255,255,255,0.5); font-size: 7px; letter-spacing: 1px; margin-bottom: 6px; }
.wait-code-val { color: #f5a623; font-size: 22px; letter-spacing: 8px; }
.wait-sub { color: rgba(255,255,255,0.5); font-size: 7px; text-align: center; line-height: 2.5; letter-spacing: 0.5px; white-space: pre-line; }
.wait-dots { color: #00d4ff; font-size: 20px; letter-spacing: 6px; animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── POPUP ── */
.popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
.popup-overlay.active { display: flex; }
.popup-box { background: linear-gradient(145deg,#16213e,#0f3460); border: 2px solid #f5a623; border-radius: 20px; padding: 24px 20px 20px; width: min(320px,88vw); display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 0 40px rgba(245,166,35,0.4),0 20px 60px rgba(0,0,0,0.6); animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.popup-emoji { font-size: 42px; line-height: 1; filter: drop-shadow(0 0 10px rgba(245,166,35,0.8)); animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-6px)} }
.popup-title { color: #f5a623; font-size: 14px; text-shadow: 2px 2px 0 #7a5010; letter-spacing: 2px; }
.popup-info { display: flex; gap: 12px; }
.popup-stat { background: rgba(0,0,0,0.3); border: 1px solid rgba(245,166,35,0.3); border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 70px; }
.popup-stat-val { color: #f5a623; font-size: 14px; display: block; margin-bottom: 3px; }
.popup-stat-lbl { color: rgba(255,255,255,0.6); font-size: 4px; letter-spacing: 0.5px; }
.popup-stars { font-size: 20px; letter-spacing: 4px; filter: drop-shadow(0 0 6px gold); }
.popup-btn-row { display: flex; gap: 10px; width: 100%; margin-top: 4px; }
.popup-btn { flex: 1; height: 44px; border: 2px solid; border-radius: 22px; background: transparent; font-family: 'Press Start 2P', cursive; font-size: 8px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; }
.popup-btn:active { transform: scale(0.95); }
.popup-btn.continue { background: linear-gradient(135deg,#00d4ff,#0080ff); border-color: #00d4ff; color: #fff; box-shadow: 0 0 16px rgba(0,212,255,0.5); }
.popup-btn.menu-btn { color: #f5a623; border-color: #f5a623; }

/* ── GAME OVER ── */
.gameover-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 300; backdrop-filter: blur(6px); }
.gameover-overlay.active { display: flex; }
.gameover-box { background: linear-gradient(145deg,#1a0010,#3d0020); border: 2px solid #ff0055; border-radius: 20px; padding: 28px 24px 22px; width: min(300px,85vw); display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 0 50px rgba(255,0,85,0.5); animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
.gameover-emoji { font-size: 48px; line-height: 1; animation: shake 0.5s ease infinite alternate; }
@keyframes shake { from{transform:rotate(-5deg)} to{transform:rotate(5deg)} }
.gameover-title { color: #ff0055; font-size: 14px; text-shadow: 2px 2px 0 #800028; letter-spacing: 2px; }
.gameover-txt { color: rgba(255,255,255,0.7); font-size: 7px; text-align: center; line-height: 2; letter-spacing: 0.5px; }
.gameover-btn-row { display: flex; gap: 10px; width: 100%; }
.gameover-btn { flex: 1; height: 44px; border: 2px solid; border-radius: 22px; background: transparent; font-family: 'Press Start 2P', cursive; font-size: 7px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; }
.gameover-btn:active { transform: scale(0.95); }
.gameover-btn.retry { background: linear-gradient(135deg,#ff0055,#cc0040); border-color: #ff0055; color: #fff; box-shadow: 0 0 16px rgba(255,0,85,0.5); }
.gameover-btn.menu  { color: #00d4ff; border-color: #00d4ff; }

/* ── SONUÇ ── */
#result-ov { background: rgba(10,10,30,0.98); align-items: center; justify-content: center; gap: 18px; padding: 20px; }
.result-emoji { font-size: 56px; line-height: 1; animation: bounce 0.6s ease infinite alternate; }
.result-title { font-size: 16px; text-align: center; letter-spacing: 2px; }
.result-title.win  { color: #f5a623; text-shadow: 2px 2px 0 #7a5010; }
.result-title.lose { color: #ff0055; text-shadow: 2px 2px 0 #800028; }
.result-sub { color: rgba(255,255,255,0.6); font-size: 7px; text-align: center; line-height: 2.5; letter-spacing: 0.5px; white-space: pre-line; }
.result-btn-row { display: flex; gap: 10px; }
</style>
</head>
<body>

<!-- HUD -->
<div class="top">
  <div class="hud-left">
    <div class="hud-lv">🦔 <span id="myApples">0</span>/5</div>
    <div class="hud-sc">⭐ <span id="sc">0</span></div>
  </div>
  <div class="hud-center">
    <div class="hud-title" id="hudTitle">KİRPY</div>
    <div class="timer-row">
      <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
      <span class="timer-sec" id="timerSec">60</span>
    </div>
  </div>
  <div class="hud-right">
    <div class="hud-p2sc">👾 <span id="p2Apples">–</span></div>
    <div class="hud-apples">
      <span class="apple-icon" id="a0">🍎</span>
      <span class="apple-icon" id="a1">🍎</span>
      <span class="apple-icon" id="a2">🍎</span>
      <span class="apple-icon" id="a3">🍎</span>
      <span class="apple-icon" id="a4">🍎</span>
    </div>
  </div>
</div>

<!-- OYUN ALANI -->
<div class="mid" id="midArea">
  <canvas id="c"></canvas>
  <div class="swipe-hint">KAYDIRARAK HAREKET ET</div>
</div>

<!-- WIN POPUP -->
<div class="popup-overlay" id="winPopup">
  <div class="popup-box">
    <div class="popup-emoji">🎉</div>
    <div class="popup-title">AFERİN!</div>
    <div class="popup-stars" id="popupStars">⭐⭐⭐</div>
    <div class="popup-info">
      <div class="popup-stat">
        <span class="popup-stat-val" id="popupSc">0</span>
        <span class="popup-stat-lbl">PUAN</span>
      </div>
      <div class="popup-stat">
        <span class="popup-stat-val" id="popupTime">0</span>
        <span class="popup-stat-lbl">KALAN SÜRE</span>
      </div>
    </div>
    <div class="popup-btn-row">
      <button class="popup-btn menu-btn" id="popupMenu">MENU</button>
      <button class="popup-btn continue" id="popupContinue">TEKRAR</button>
    </div>
  </div>
</div>

<!-- GAME OVER POPUP -->
<div class="gameover-overlay" id="gameoverPopup">
  <div class="gameover-box">
    <div class="gameover-emoji">💀</div>
    <div class="gameover-title">SURE BITTI</div>
    <div class="gameover-txt">PUAN: <span id="goSc">0</span></div>
    <div class="gameover-btn-row">
      <button class="gameover-btn menu" id="goMenu">MENU</button>
      <button class="gameover-btn retry" id="goRetry">TEKRAR</button>
    </div>
  </div>
</div>

<!-- ANA EKRAN -->
<div id="ov" class="overlay active">
  <img src="image.png" id="bgImage" alt="">
  <div id="loadingSpinner"><div class="spinner"></div></div>
  <button id="settingsBtn" aria-label="Ayarlar">
    <svg class="settings-icon" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <div class="main-btn-area">
    <button class="main-btn" id="singleBtn">SINGLE PLAYER</button>
    <button class="main-btn" id="multiBtn">MULTIPLAYER</button>
    <div class="mp-sub-btns" id="mpSubBtns">
      <button class="sub-btn" id="quickBtn">HIZLI ESLESTIR</button>
      <button class="sub-btn" id="roomBtn">ODA KUR / GIR</button>
    </div>
  </div>
</div>

<!-- AYAR -->
<div id="settings-ov" class="overlay">
  <div class="settings-title">AYARLAR</div>
  <div class="settings-row">
    <span class="settings-lbl">SES</span>
    <button class="toggle on" id="soundToggle"></button>
  </div>
  <button class="settings-back" id="settingsBackBtn">GERI</button>
</div>

<!-- ODA -->
<div id="room-ov" class="overlay">
  <div class="room-title">MULTIPLAYER</div>

function rsz(){

  if(SZ<16) SZ=16;

/* ── MAZE ── */
function makeRng(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
var rngFn=Math.random;

function makeGrid(){
  var g=[];
  for(var y=0;y<R;y++){ g[y]=[]; for(var x=0;x<C;x++) g[y][x]=WALL; }
  return g;
}

function carveMaze(g,fn){
  var vis=[];
  for(var y=0;y<R;y++){ vis[y]=[]; for(var x=0;x<C;x++) vis[y][x]=false; }
  function cr(x,y){
    vis[y][x]=true; g[y][x]=FLOOR;
    var dirs=[[0,-2],[0,2],[-2,0],[2,0]];
    for(var i=3;i>0;i--){ var j=Math.floor(fn()*(i+1)); var tmp=dirs[i]; dirs[i]=dirs[j]; dirs[j]=tmp; }
    for(var i=0;i<4;i++){
      var nx=x+dirs[i][0], ny=y+dirs[i][1];
      if(nx>=0&&nx<C&&ny>=0&&ny<R&&!vis[ny][nx]){
        g[ny-dirs[i][1]/2][nx-dirs[i][0]/2]=FLOOR; cr(nx,ny);
      }
    }
  }
  cr(1,1);
}

function placeApples(g,fn,count){
  var fl=[];
  for(var y=0;y<R;y++) for(var x=0;x<C;x++)
    if(g[y][x]===FLOOR&&!(x===P1_SX&&y===P1_SY)&&!(x===P2_SX&&y===P2_SY))
      fl.push([x,y]);
  for(var i=fl.length-1;i>0;i--){ var j=Math.floor(fn()*(i+1)); var tmp=fl[i]; fl[i]=fl[j]; fl[j]=tmp; }
  for(var i=0;i<Math.min(count,fl.length);i++) g[fl[i][1]][fl[i][0]]=APPLE;
}

function placeTeleports(g,fn){
  /* Sol: x=0, bitişik g[y][1] FLOOR olmalı */
  var lc=[];
  for(var y=1;y<R-1;y++) if(g[y][1]===FLOOR) lc.push(y);
  var tl=null;
  if(lc.length){ var li=Math.floor(fn()*lc.length); tl={x:0,y:lc[li]}; g[lc[li]][0]=TP; }

  /* Sağ: x=C-1, bitişik g[y][C-2] FLOOR olmalı */
  var rc=[];
  for(var y=1;y<R-1;y++) if(g[y][C-2]===FLOOR) rc.push(y);
  var tr=null;
  if(rc.length){ var ri=Math.floor(fn()*rc.length); tr={x:C-1,y:rc[ri]}; g[rc[ri]][C-1]=TP; }

  /* Üst: y=0, bitişik g[1][x] FLOOR olmalı */
  var tc=[];
  for(var x=1;x<C-1;x++) if(g[1][x]===FLOOR) tc.push(x);
  var tt=null;
  if(tc.length){ var ti=Math.floor(fn()*tc.length); tt={x:tc[ti],y:0}; g[0][tc[ti]]=TP; }

  /* Alt: y=R-1, bitişik g[R-2][x] FLOOR olmalı */
  var bc=[];
  for(var x=1;x<C-1;x++) if(g[R-2][x]===FLOOR) bc.push(x);
  var tb=null;
  if(bc.length){ var bi=Math.floor(fn()*bc.length); tb={x:bc[bi],y:R-1}; g[R-1][bc[bi]]=TP; }

  return {tl:tl,tr:tr,tt:tt,tb:tb};
}

function buildFromSeed(seed){
  rngFn=makeRng(seed);
  pal=PAL[Math.floor(rngFn()*PAL.length)];
  grid=makeGrid();
  carveMaze(grid,rngFn);
  grid[P1_SY][P1_SX]=FLOOR;
  grid[P2_SY][P2_SX]=FLOOR;
  placeApples(grid,rngFn,isMultiplayer?10:5);
  var tp=placeTeleports(grid,rngFn);
  tpLeft=tp.tl; tpRight=tp.tr; tpTop=tp.tt; tpBottom=tp.tb;
}

function serializeGrid(g){ var a=[]; for(var y=0;y<R;y++) for(var x=0;x<C;x++) a.push(g[y][x]); return a; }
function deserializeGrid(a){ var g=makeGrid(); for(var y=0;y<R;y++) for(var x=0;x<C;x++) g[y][x]=a[y*C+x]; return g; }

function startQuickMatch(){
  isQuickMatch=true;
  var waitRef=db.ref('matchmaking/waiting');
  waitRef.once('value').then(function(snap){
    var waiting=snap.val();
    if(waiting&&waiting.roomId&&waiting.deviceId!==getDeviceId()){
      var foundRoom=waiting.roomId;
      waitRef.transaction(function(current){
        if(current&&current.roomId===foundRoom) return null;
        return current;
      }).then(function(result){
        if(!result.committed){ startQuickMatch(); return; }
        roomId=foundRoom; myId='p2'; opId='p1';
        roomRef=db.ref('rooms/'+roomId);
        myRef=db.ref('rooms/'+roomId+'/p2');
        opRef=db.ref('rooms/'+roomId+'/p1');
        document.getElementById('waitTitle').textContent='ESLESTIRIDI';
        document.getElementById('waitCodeLbl').textContent='BAGLANIYOR';
        document.getElementById('waitCode').textContent='...';
        document.getElementById('waitSub').textContent='Oyun basliyor...\nBeklemede kal';
        showOverlay('wait-ov');
        myRef.update({x:P2_SX,y:P2_SY,apples:0,score:0,hasExit:false,exitX:-1,exitY:-1,online:true})
        .then(function(){
          var fn=function(snap){ var seed=snap.val(); if(seed!==null){ clearListeners(); startMultiplayerAsP2(seed); } };
          addListener(db.ref('rooms/'+roomId+'/seed'),'value',fn);
        });
      });
    } else {
      var code=randomCode();
      roomId=code; myId='p1'; opId='p2';
      roomRef=db.ref('rooms/'+roomId);
      roomRef.set({
        status:'waiting',seed:null,grid:null,winner:null,timerLeft:60,
        p1:{x:P1_SX,y:P1_SY,apples:0,score:0,hasExit:false,exitX:-1,exitY:-1,online:true},
        p2:{x:P2_SX,y:P2_SY,apples:0,score:0,hasExit:false,exitX:-1,exitY:-1,online:false}
      }).then(function(){
        quickRef=waitRef;
        return waitRef.set({roomId:roomId,deviceId:getDeviceId(),timestamp:firebase.database.ServerValue.TIMESTAMP});
      }).then(function(){
        document.getElementById('waitTitle').textContent='RAKIP ARANIIYOR';
        document.getElementById('waitCodeLbl').textContent='ODA KODU';
        document.getElementById('waitCode').textContent=code;
        document.getElementById('waitSub').textContent='Rakip bekleniyor...\nOda kodu ile de girebilir';
        showOverlay('wait-ov');
        var fn=function(snap){
          if(snap.val()===true){ clearListeners(); clearTimeout(quickTimeout); if(quickRef){quickRef.remove();quickRef=null;} startMultiplayerAsP1(); }
        };
        addListener(db.ref('rooms/'+roomId+'/p2/online'),'value',fn);
        quickTimeout=setTimeout(function(){
          clearListeners();
          if(quickRef){quickRef.remove();quickRef=null;}
          if(roomRef){roomRef.remove();roomRef=null;}
          roomId=null;myId=null;opId=null;isQuickMatch=false;
          showOverlay('ov');
        },60000);
      });
    }
  });
}

/* ── MULTİPLAYER P1 ── */
function startMultiplayerAsP1(){
  isMultiplayer=true; gameActive=true;
  myRef=db.ref('rooms/'+roomId+'/p1');
  opRef=db.ref('rooms/'+roomId+'/p2');
  gridRef=db.ref('rooms/'+roomId+'/grid');
  initMultiplayerState();
  var seed=Math.floor(Math.random()*9999999)+1;
  buildFromSeed(seed);
  var tpData={
    tpLeft:   tpLeft   ?{x:tpLeft.x,  y:tpLeft.y}  :null,
    tpRight:  tpRight  ?{x:tpRight.x, y:tpRight.y} :null,
    tpTop:    tpTop    ?{x:tpTop.x,   y:tpTop.y}   :null,
    tpBottom: tpBottom ?{x:tpBottom.x,y:tpBottom.y}:null
  };
  db.ref('rooms/'+roomId+'/grid').set(serializeGrid(grid))
  .then(function(){ return db.ref('rooms/'+roomId+'/seed').set(seed); })
  .then(function(){ return db.ref('rooms/'+roomId+'/teleports').set(tpData); })
  .then(function(){ return db.ref('rooms/'+roomId+'/status').set('playing'); })
  .then(function(){
    hideAllOverlays(); rsz();
    px=P1_SX; py=P1_SY;
    pushMyPos(); listenOpponent(); startTimer();
    if(!animFrame) loop();
  });
}

/* ── MULTİPLAYER P2 ── */
function startMultiplayerAsP2(seed){
  isMultiplayer=true; gameActive=true;
  myRef=db.ref('rooms/'+roomId+'/p2');
  opRef=db.ref('rooms/'+roomId+'/p1');
  gridRef=db.ref('rooms/'+roomId+'/grid');
  initMultiplayerState();
  Promise.all([
    db.ref('rooms/'+roomId+'/grid').once('value'),
    db.ref('rooms/'+roomId+'/teleports').once('value'),
    db.ref('rooms/'+roomId+'/seed').once('value')
  ]).then(function(results){
    var arr=results[0].val();
    if(arr){ grid=deserializeGrid(arr); }
    else   { buildFromSeed(seed); }
    var tpData=results[1].val();
    if(tpData){
      tpLeft   =tpData.tpLeft   ||null;
      tpRight  =tpData.tpRight  ||null;
      tpTop    =tpData.tpTop    ||null;
      tpBottom =tpData.tpBottom ||null;
    } else { reconstructTeleports(seed); }
    var fn=makeRng(results[2].val()||seed);
    pal=PAL[Math.floor(fn()*PAL.length)];
    hideAllOverlays(); rsz();
    px=P2_SX; py=P2_SY;
    document.getElementById('hudTitle').textContent='2P';
    pushMyPos(); listenOpponent(); startTimer();
    if(!animFrame) loop();
  });
}

function initMultiplayerState(){
  px=P1_SX; py=P1_SY; opx=P2_SX; opy=P2_SY;
  myApples=0; opApples=0; sc=0;
  exitPos=null; opExitPos=null;
  p1ExitPos=null; p2ExitPos=null;
  parts=[]; blocked=false;
  updateMyHUD();
  document.getElementById('sc').textContent=0;
  document.getElementById('p2Apples').textContent=0;
  document.getElementById('hudTitle').textContent='2P';
  timerMax=60; timerLeft=60;
  if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; }
  clearInterval(timerInterval);
}

function reconstructTeleports(seed){
  var fn=makeRng(seed);
  pal=PAL[Math.floor(fn()*PAL.length)];
  var tmp=makeGrid(); carveMaze(tmp,fn);
  var fl=[];
  for(var y=0;y<R;y++) for(var x=0;x<C;x++)
    if(tmp[y][x]===FLOOR&&!(x===P1_SX&&y===P1_SY)&&!(x===P2_SX&&y===P2_SY)) fl.push([x,y]);
  for(var i=fl.length-1;i>0;i--){ var j=Math.floor(fn()*(i+1)); var t=fl[i];fl[i]=fl[j];fl[j]=t; }
  for(var i=0;i<10;i++) fn();
  var lc=[]; for(var y=1;y<R-1;y++) if(tmp[y][1]===FLOOR) lc.push(y);
  tpLeft=null; if(lc.length){ var li=Math.floor(fn()*lc.length); tpLeft={x:0,y:lc[li]}; }
  var rc=[]; for(var y=1;y<R-1;y++) if(tmp[y][C-2]===FLOOR) rc.push(y);
  tpRight=null; if(rc.length){ var ri=Math.floor(fn()*rc.length); tpRight={x:C-1,y:rc[ri]}; }
  var tc=[]; for(var x=1;x<C-1;x++) if(tmp[1][x]===FLOOR) tc.push(x);
  tpTop=null; if(tc.length){ var ti=Math.floor(fn()*tc.length); tpTop={x:tc[ti],y:0}; }
  var bc=[]; for(var x=1;x<C-1;x++) if(tmp[R-2][x]===FLOOR) bc.push(x);
  tpBottom=null; if(bc.length){ var bi=Math.floor(fn()*bc.length); tpBottom={x:bc[bi],y:R-1}; }
}

/* ── FIREBASE PUSH / LISTEN ── */
function pushMyPos(){
  if(!myRef||!gameActive) return;
  myRef.update({
    x:px,y:py,apples:myApples,score:sc,
    hasExit:exitPos!==null,
    exitX:exitPos?exitPos[0]:-1,
    exitY:exitPos?exitPos[1]:-1,
    online:true
  });
}

function listenOpponent(){
  var posFn=function(snap){
    var v=snap.val(); if(!v) return;
    opx=v.x!=null?v.x:opx;
    opy=v.y!=null?v.y:opy;
    opApples=v.apples||0;
    /* Rakibin kapısını kaydet */
    if(v.hasExit&&v.exitX>=0){
      opExitPos=[v.exitX,v.exitY];
      /* Mutlak referanslar: p1/p2 kim olduğuna bakmaksızın */
      if(opId==='p1') p1ExitPos=opExitPos;
      else            p2ExitPos=opExitPos;
    }
    document.getElementById('p2Apples').textContent=opApples;
  };
  addListener(opRef,'value',posFn);

  var gridFn=function(snap){
    var arr=snap.val(); if(!arr||!grid) return;
    for(var y=0;y<R;y++) for(var x=0;x<C;x++){
      if(grid[y][x]===APPLE&&arr[y*C+x]===FLOOR) grid[y][x]=FLOOR;
    }
  };
  addListener(gridRef,'value',gridFn);

  var winFn=function(snap){
    var winner=snap.val();
    if(winner&&gameActive){
      gameActive=false; blocked=true;
      stopTimer(); clearListeners();
      setTimeout(function(){ showResult(winner===myId); },600);
    }
  };
  addListener(db.ref('rooms/'+roomId+'/winner'),'value',winFn);

  if(myId==='p2'){
    var tFn=function(snap){
      var t=snap.val();
      if(t!=null&&timerRunning){ timerLeft=t; updateTimerBar(); }
    };
    addListener(db.ref('rooms/'+roomId+'/timerLeft'),'value',tFn);
  }
}

/* ── MOVE ── */
function move(dx,dy){
  if(!grid||blocked||!gameActive) return;
  var nx=px+dx, ny=py+dy;
  if(nx<0||nx>=C||ny<0||ny>=R) return;
  var cell=grid[ny][nx];
  if(cell===WALL) return;

  /* TELEPORT — tüm 4 yön */
  if(cell===TP){
    vib('tp');
    spawnParticles(px,py,'#00d4ff');
    var tp=getTeleportDest(nx,ny);
    if(tp){ px=tp.x; py=tp.y; }
    else   { px=nx;  py=ny;  }
    spawnParticles(px,py,'#00d4ff');
    if(isMultiplayer) pushMyPos();
    return;
  }

  /* ÇIKIŞ KAPISI */
  if(cell===EXIT&&exitPos&&nx===exitPos[0]&&ny===exitPos[1]){
    blocked=true; px=nx; py=ny;
    stopTimer();
    sc+=200+Math.floor(timerLeft)*5;
    document.getElementById('sc').textContent=sc;
    vib('win');
    if(isMultiplayer){ pushMyPos(); db.ref('rooms/'+roomId+'/winner').set(myId); }
    else showWinPopupSingle();
    return;
  }

  /* NORMAL */
  px=nx; py=ny;
  vib('move');

  if(cell===APPLE){
    if(myApples>=5){ showTokum(nx,ny); return; }
    grid[ny][nx]=FLOOR; myApples++; sc+=100;
    vib('apple'); spawnParticles(nx,ny,'#f5a623');
    updateMyHUD(); document.getElementById('sc').textContent=sc;
    if(isMultiplayer) db.ref('rooms/'+roomId+'/grid').set(serializeGrid(grid));
    if(myApples===5){
      var ep=findExitSpot();
      if(ep){
        exitPos=ep;
        /* Mutlak referans */
        if(myId==='p1') p1ExitPos=ep; else p2ExitPos=ep;
        grid[ep[1]][ep[0]]=EXIT;
        vib('door'); spawnParticles(ep[0],ep[1],'#ffd700');
        if(isMultiplayer) db.ref('rooms/'+roomId+'/grid').set(serializeGrid(grid));
      }
    }
  }
  if(isMultiplayer) pushMyPos();
}

/* Teleport hedefini döndür */
function getTeleportDest(nx,ny){
  if(tpLeft   &&nx===tpLeft.x   &&ny===tpLeft.y   &&tpRight)  return {x:tpRight.x,  y:tpRight.y};
  if(tpRight  &&nx===tpRight.x  &&ny===tpRight.y  &&tpLeft)   return {x:tpLeft.x,   y:tpLeft.y};
  if(tpTop    &&nx===tpTop.x    &&ny===tpTop.y    &&tpBottom) return {x:tpBottom.x, y:tpBottom.y};
  if(tpBottom &&nx===tpBottom.x &&ny===tpBottom.y &&tpTop)    return {x:tpTop.x,    y:tpTop.y};
  return null;
}

function findExitSpot(){
  var excl=[[P1_SX,P1_SY],[P2_SX,P2_SY],[px,py]];
  if(tpLeft)    excl.push([tpLeft.x,tpLeft.y]);
  if(tpRight)   excl.push([tpRight.x,tpRight.y]);
  if(tpTop)     excl.push([tpTop.x,tpTop.y]);
  if(tpBottom)  excl.push([tpBottom.x,tpBottom.y]);
  if(exitPos)   excl.push(exitPos);
  if(opExitPos) excl.push(opExitPos);
  var fl=[];
  for(var y=0;y<R;y++) for(var x=0;x<C;x++){
    if(grid[y][x]!==FLOOR) continue;
    var ok=true;
    for(var k=0;k<excl.length;k++) if(excl[k][0]===x&&excl[k][1]===y){ok=false;break;}
    if(ok) fl.push([x,y]);
  }
  if(!fl.length) return null;
  return fl[Math.floor(Math.random()*fl.length)];
}

function showTokum(gx,gy){
  var mid=document.getElementById('midArea');
  var ox=(mid.clientWidth-cv.width)/2, oy=(mid.clientHeight-cv.height)/2;
  var el=document.createElement('div');
  el.className='tokum-float'; el.textContent='TOKUM!';
  el.style.cssText='left:'+(ox+gx*SZ+SZ/2)+'px;top:'+(oy+gy*SZ)+'px;transform:translateX(-50%)';
  mid.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.remove(); },1500);
}

function updateMyHUD(){
  document.getElementById('myApples').textContent=myApples;
  for(var i=0;i<5;i++) document.getElementById('a'+i).classList.toggle('collected',i<myApples);
}

/* ── TIMER ── */
function startTimer(){
  timerLeft=timerMax; timerRunning=true; updateTimerBar();
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    if(!timerRunning) return;
    timerLeft=Math.max(0,timerLeft-0.1);
    updateTimerBar();
    if(isMultiplayer&&myId==='p1') db.ref('rooms/'+roomId+'/timerLeft').set(+(timerLeft.toFixed(1)));
    if(timerLeft<=0){
      clearInterval(timerInterval); timerRunning=false;
      if(!blocked){
        blocked=true;
        if(isMultiplayer){
          db.ref('rooms/'+roomId+'/winner').once('value').then(function(snap){
            if(!snap.val()){
              db.ref('rooms/'+roomId+'/'+myId+'/score').set(sc).then(function(){ setTimeout(resolveByScore,400); });
            }
          });
        } else { setTimeout(showGameoverSingle,800); }
      }
    }
  },100);
}

function resolveByScore(){
  db.ref('rooms/'+roomId).once('value').then(function(snap){
    var v=snap.val(); if(!v||!gameActive) return;
    db.ref('rooms/'+roomId+'/winner').set((v.p1?v.p1.score:0)>=(v.p2?v.p2.score:0)?'p1':'p2');
  });
}

function stopTimer(){ timerRunning=false; clearInterval(timerInterval); }

function updateTimerBar(){
  var pct=timerLeft/timerMax*100;
  var bar=document.getElementById('timerBar');
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'linear-gradient(90deg,#f5a623,#ff6b00)':pct>25?'linear-gradient(90deg,#ff6b00,#ff3300)':'linear-gradient(90deg,#ff0000,#cc0000)';
  document.getElementById('timerSec').textContent=Math.ceil(timerLeft);
}

/* ── SONUÇLAR ── */
function showWinPopupSingle(){
  var pct=timerLeft/timerMax;
  document.getElementById('popupStars').textContent=pct>0.6?'⭐⭐⭐':pct>0.3?'⭐⭐':'⭐';
  document.getElementById('popupSc').textContent=sc;
  document.getElementById('popupTime').textContent=Math.floor(timerLeft);
  document.getElementById('winPopup').classList.add('active');
  vib('win');
}

function showGameoverSingle(){
  document.getElementById('goSc').textContent=sc;
  document.getElementById('gameoverPopup').classList.add('active');
  vib('gameover');
}

function showResult(iWon){
  gameActive=false;
  document.getElementById('resultEmoji').textContent=iWon?'🏆':'😢';
  var t=document.getElementById('resultTitle');
  t.textContent=iWon?'KAZANDIN!':'KAYBETTIN!';
  t.className='result-title '+(iWon?'win':'lose');
  document.getElementById('resultSub').textContent='Puan: '+sc+'\nElma: '+myApples+'/5\n'+(iWon?'Cikistan ilk cikan sen oldun!':'Rakibin once cikti!');
  showOverlay('result-ov');
  vib(iWon?'win':'gameover');
}

/* ── TEK OYUNCU ── */
function startSingle(){
  clearListeners(); stopTimer();
  if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; }
  document.getElementById('winPopup').classList.remove('active');
  document.getElementById('gameoverPopup').classList.remove('active');
  isMultiplayer=false; gameActive=true; isQuickMatch=false;
  myId='p1'; opId=null;
  px=P1_SX; py=P1_SY; opx=-1; opy=-1;
  myApples=0; opApples=0; sc=0;
  exitPos=null; opExitPos=null; p1ExitPos=null; p2ExitPos=null;
  parts=[]; blocked=false;
  roomId=null; roomRef=null; myRef=null; opRef=null;
  buildFromSeed(Math.floor(Math.random()*9999999)+1);
  updateMyHUD();
  document.getElementById('sc').textContent=0;
  document.getElementById('p2Apples').textContent='–';
  document.getElementById('hudTitle').textContent='KİRPY';
  timerMax=60; timerLeft=60;
  startTimer(); loop();
}

/* ── DRAW ── */
function drawCell(x,y,cell){
  var px2=x*SZ, py2=y*SZ;
  ctx.fillStyle=cell===WALL?pal.w:pal.f;
  ctx.fillRect(px2,py2,SZ,SZ);
  if(cell===WALL){ ctx.fillStyle=pal.wt; ctx.fillRect(px2+2,py2+2,SZ-4,Math.max(3,SZ*0.15)); }

  if(cell===APPLE){
    var s=0.88+0.12*Math.sin(Date.now()/400+x+y);
    ctx.save(); ctx.translate(px2+SZ/2,py2+SZ/2); ctx.scale(s,s);
    ctx.fillStyle='#e53935'; ctx.beginPath(); ctx.arc(0,SZ*0.05,SZ*0.24,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#388e3c'; ctx.fillRect(-SZ*0.05,-SZ*0.26,SZ*0.1,SZ*0.18);
    ctx.restore();
  }

  /* P1 kapısı — her zaman SARI */
if(p1ExitPos && x===p1ExitPos[0] && y===p1ExitPos[1]){
  var p=0.55+0.4*Math.sin(epAnim*Math.PI*2);
  ctx.fillStyle='rgba(255,214,0,'+p+')';
  ctx.beginPath(); ctx.roundRect(px2+3,py2+3,SZ-6,SZ-6,5); ctx.fill();
  ctx.font=(SZ*0.52)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🚪',px2+SZ/2,py2+SZ/2+1);
}

/* P2 kapısı — her zaman PEMBE */
if(p2ExitPos && x===p2ExitPos[0] && y===p2ExitPos[1]
   && !(p1ExitPos && x===p1ExitPos[0] && y===p1ExitPos[1])){
  var p2=0.35+0.2*Math.sin(epAnim*Math.PI*2);
  ctx.fillStyle='rgba(255,110,199,'+p2+')';
  ctx.beginPath(); ctx.roundRect(px2+3,py2+3,SZ-6,SZ-6,5); ctx.fill();
  ctx.font=(SZ*0.52)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🚪',px2+SZ/2,py2+SZ/2+1);
}

  if(cell===TP){
    var tp=0.7+0.3*Math.sin(Date.now()/300+x*y);
    ctx.fillStyle='rgba(0,212,255,'+tp+')';
    ctx.beginPath(); ctx.roundRect(px2+2,py2+2,SZ-4,SZ-4,6); ctx.fill();
    ctx.font=(SZ*0.52)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🌀',px2+SZ/2,py2+SZ/2);
  }
}

function drawKirpi(kx,ky,isP2){
  var cx=kx*SZ+SZ/2, cy=ky*SZ+SZ/2, s=SZ/38;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
  if(isP2){
    ctx.fillStyle='#880e4f'; ctx.beginPath(); ctx.ellipse(0,2,13,9,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#4a0030'; ctx.lineWidth=2;
    [[-5,-12],[5,-12],[-8,-9],[8,-9],[-11,-5],[11,-5],[0,-13]].forEach(function(d){ ctx.beginPath(); ctx.moveTo(d[0]*0.3,d[1]*0.3); ctx.lineTo(d[0],d[1]); ctx.stroke(); });
    ctx.fillStyle='#f8bbd0'; ctx.beginPath(); ctx.ellipse(6,2,7,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(10,0,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(11,-0.5,0.7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#9c27b0'; ctx.beginPath(); ctx.arc(13,2,1.4,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#795548'; ctx.beginPath(); ctx.ellipse(0,2,13,9,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#4e342e'; ctx.lineWidth=2;
    [[-5,-12],[5,-12],[-8,-9],[8,-9],[-11,-5],[11,-5],[0,-13]].forEach(function(d){ ctx.beginPath(); ctx.moveTo(d[0]*0.3,d[1]*0.3); ctx.lineTo(d[0],d[1]); ctx.stroke(); });
    ctx.fillStyle='#d7ccc8'; ctx.beginPath(); ctx.ellipse(6,2,7,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(10,0,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(11,-0.5,0.7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e91e63'; ctx.beginPath(); ctx.arc(13,2,1.4,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function spawnParticles(x,y,color){
  var cx=x*SZ+SZ/2, cy=y*SZ+SZ/2;
  for(var i=0;i<10;i++){ var a=Math.PI*2/10*i; parts.push({x:cx,y:cy,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,l:1,c:color}); }
}

function loop(ts){
  ts=ts||0; epAnim=(ts/2000)%1;
  ctx.fillStyle=pal.bg; ctx.fillRect(0,0,cv.width,cv.height);
  if(grid){ for(var y=0;y<R;y++) for(var x=0;x<C;x++) drawCell(x,y,grid[y][x]); }
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.l-=0.035;
    if(p.l<=0){ parts.splice(i,1); continue; }
    ctx.globalAlpha=p.l; ctx.fillStyle=p.c||'#f5a623';
    ctx.beginPath(); ctx.arc(p.x,p.y,SZ*0.12,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  }
  if(grid){
    if(isMultiplayer&&opx>=0&&opy>=0){
      /* P1 kahverengi, P2 pembe — hangi telefonda bakılırsa bakılsın */
      if(myId==='p1'){
        drawKirpi(opx,opy,true);  /* rakip = P2 = pembe */
        drawKirpi(px,py,false);   /* ben   = P1 = kahverengi */
      } else {
        drawKirpi(opx,opy,false); /* rakip = P1 = kahverengi */
        drawKirpi(px,py,true);    /* ben   = P2 = pembe */
      }
    } else {
      drawKirpi(px,py,false);
    }
  }
  animFrame=requestAnimationFrame(loop);
}

/* ── INPUT ── */
document.addEventListener('keydown',function(e){
  var m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  if(m[e.key]){ e.preventDefault(); move(m[e.key][0],m[e.key][1]); }
});
var touchSX=0,touchSY=0;
document.addEventListener('touchstart',function(e){ if(e.target.closest('.overlay,.popup-overlay,.gameover-overlay')) return; touchSX=e.touches[0].clientX; touchSY=e.touches[0].clientY; },{passive:true});
document.addEventListener('touchend',function(e){
  if(e.target.closest('.overlay,.popup-overlay,.gameover-overlay')) return;
  var dx=e.changedTouches[0].clientX-touchSX, dy=e.changedTouches[0].clientY-touchSY;
  if(Math.max(Math.abs(dx),Math.abs(dy))<18) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1,0); else move(0,dy>0?1:-1);
},{passive:true});
var msDown=false,msSX=0,msSY=0;
document.addEventListener('mousedown',function(e){ if(e.target.closest('.overlay,.popup-overlay,.gameover-overlay')) return; msDown=true; msSX=e.clientX; msSY=e.clientY; });
document.addEventListener('mouseup',function(e){
  if(!msDown) return; msDown=false;
  if(e.target.closest('.overlay,.popup-overlay,.gameover-overlay')) return;
  var dx=e.clientX-msSX, dy=e.clientY-msSY;
  if(Math.max(Math.abs(dx),Math.abs(dy))<10) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1,0); else move(0,dy>0?1:-1);
});
document.addEventListener('mouseleave',function(){ msDown=false; });

/* ── BUTONLAR ── */
document.getElementById('singleBtn').onclick=function(){ initAudio(); hideAllOverlays(); rsz(); startSingle(); };

document.getElementById('waitCancelBtn').onclick=function(){
  clearListeners(); clearTimeout(quickTimeout);
  if(quickRef){quickRef.remove();quickRef=null;}
  if(roomRef){roomRef.remove();roomRef=null;}
  roomId=null;myId=null;opId=null;isQuickMatch=false;
  document.getElementById('waitTitle').textContent='ODA BEKLENIYOR';
  document.getElementById('waitCodeLbl').textContent='ODA KODU';
  document.getElementById('waitSub').textContent='Bu kodu arkadasina gonder\nve bekleme ekraninda kal';
  showOverlay('ov');
};

document.getElementById('roomBackBtn').onclick=function(){ showOverlay('ov'); };
document.getElementById('popupMenu').onclick=function(){ document.getElementById('winPopup').classList.remove('active'); showOverlay('ov'); };
document.getElementById('popupContinue').onclick=function(){ document.getElementById('winPopup').classList.remove('active'); rsz(); startSingle(); };
document.getElementById('goMenu').onclick=function(){ document.getElementById('gameoverPopup').classList.remove('active'); showOverlay('ov'); };
document.getElementById('goRetry').onclick=function(){ document.getElementById('gameoverPopup').classList.remove('active'); rsz(); startSingle(); };

document.getElementById('resultPlayAgain').onclick=function(){
  if(roomRef){roomRef.remove();}
  roomId=null;roomRef=null;myRef=null;opRef=null;gridRef=null;
  clearListeners();
  if(isQuickMatch){ showOverlay('ov'); setTimeout(startQuickMatch,300); }
  else showOverlay('room-ov');
};
document.getElementById('resultMenu').onclick=function(){
  if(roomRef){roomRef.remove();}
  roomId=null;roomRef=null;myRef=null;opRef=null;gridRef=null;
  clearListeners();isQuickMatch=false;showOverlay('ov');
};

window.addEventListener('resize',function(){ if(!document.getElementById('ov').classList.contains('active')) rsz(); });
window.addEventListener('beforeunload',function(){
  if(quickRef) try{quickRef.remove();}catch(e){}
  if(roomRef&&myId) try{db.ref('rooms/'+roomId+'/'+myId).update({online:false});}catch(e){}
});

if('serviceWorker' in navigator){ navigator.serviceWorker.register('./service-worker.js').catch(function(){}); }

rsz();
