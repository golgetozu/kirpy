<title>Kirpi Labirent</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  font-family: 'Press Start 2P', cursive;
}

html, body {
  width: 100vw;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  position: fixed;
  top: 0;
  left: 0;
  background: #1a1a2e;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
}

.top {
  flex: 0 0 auto;
  width: 100%;
  background: #1a1a2e;
  padding: 3px 5px 2px 5px;
  text-align: center;
  z-index: 10;
}

h1 {
  color: #f5a623;
  font-size: 10px;
  margin: 0;
  padding: 0;
  text-shadow: 2px 2px 0px #7a5010;
  letter-spacing: 1px;
  line-height: 1.1;
}

.hud {
  display: flex;
  gap: 3px;
  justify-content: center;
  margin-top: 2px;
  flex-wrap: wrap;
}

.hi {
  background: #16213e;
  border-radius: 3px;
  padding: 1px 4px;
  color: #fff;
  font-size: 4px;
  border: 1px solid #f5a623;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.hi b {
  color: #f5a623;
}

.mid {
  flex: 1;
  width: 100%;
  position: relative;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}

canvas {
  display: block;
  touch-action: none;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100vw;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  background: #000;
  display: none;
  flex-direction: column;
  align-items: stretch;
  z-index: 99;
  overflow: hidden;
}

.overlay.active {
  display: flex;
}

#bgImage {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}

#bgImage.loaded {
  opacity: 1;
}

#loadingSpinner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(0,212,255,0.3);
  border-top: 4px solid #00d4ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.btn-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 20px 10px 20px 10px;
  position: relative;
  z-index: 1;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
  gap: 8px;
}

.overlay h2 {
  color: #f5a623;
  font-size: 14px;
  margin: 0 0 10px 0;
  text-align: center;
  text-shadow: 3px 3px 0px #7a5010;
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
}

.overlay p {
  color: #fff;
  font-size: 6px;
  text-align: center;
  line-height: 1.8;
  margin: 0 0 8px 0;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1;
}

#startBtn {
  width: 280px;
  height: 60px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #00f5ff 0%, #0095ff 50%, #0066ff 100%);
  color: #fff;
  font-size: 13px;
  letter-spacing: 3px;
  box-shadow: 0 0 30px rgba(0,149,255,0.8);
  text-shadow: 0 0 10px rgba(255,255,255,0.8);
  animation: pulseGlow 2s ease-in-out infinite;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s;
}

#startBtn:active {
  transform: scale(0.95);
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(0,149,255,0.6); }
  50% { box-shadow: 0 0 40px rgba(0,200,255,1); }
}

.btn {
  width: 200px;
  height: 50px;
  border: 2px solid;
  border-radius: 25px;
  padding: 0;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 1.5px;
  background: transparent;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s;
}

.btn:active {
  transform: scale(0.95);
}

.btn-blue {
  color: #00d4ff;
  border-color: #00d4ff;
  text-shadow: 0 0 8px rgba(0,212,255,0.8);
  box-shadow: 0 0 15px rgba(0,212,255,0.4);
}

.btn-red {
  color: #ff0055;
  border-color: #ff0055;
  text-shadow: 0 0 8px rgba(255,0,85,0.8);
  box-shadow: 0 0 15px rgba(255,0,85,0.4);
}

.lv-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  padding: 15px;
  overflow-y: auto;
  max-width: 100%;
  justify-items: center;
  position: relative;
  z-index: 1;
}

.lv-btn {
  width: 50px;
  height: 50px;
  border: none;
  border-radius: 8px;
  font-size: 9px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  transition: 0.15s;
  box-shadow: 0 3px 0px #1a5c1a;
}

.lv-unlocked {
  background: #388e3c;
}

.lv-unlocked:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0px #1a5c1a;
}

.lv-locked {
  background: #333;
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: 0 3px 0px #111;
}

.swipe-hint {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.15);
  font-size: 3px;
  text-align: center;
  pointer-events: none;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="top">
  <h1>🦔 KİRPY LABİRENT</h1>
  <div class="hud">
    <div class="hi">LVL: <b id="lv">1</b></div>
    <div class="hi">⭐ <b id="sc">0</b></div>
    <div class="hi">🍎 <b id="gm">0/3</b></div>
  </div>
</div>

<div class="mid">
  <canvas id="c"></canvas>
  <div class="swipe-hint">↑ ↓ ← → KAYDIRARAK HAREKET ET</div>
</div>

<div id="ov" class="overlay">
  <div id="loadingSpinner"><div class="spinner"></div></div>
  <img src="image.png" id="bgImage" alt="">
  <div class="btn-container">
    <button id="startBtn">▶ START ◀</button>
    <button id="lb" class="btn btn-blue">📋 BÖLÜMLER</button>
    <button id="rb" class="btn btn-red">🔄 SIFIRLA</button>
  </div>
</div>

<div id="lv-ov" class="overlay">
  <div style="position: relative; z-index: 1; text-align: center; padding-top: 20px;">
    <h2>BÖLÜM SEÇ</h2>
  </div>
  <div class="lv-grid" id="lv-container"></div>
  <div style="display: flex; justify-content: center; padding: 15px; position: relative; z-index: 1;">
    <button id="lv-back" class="btn btn-blue">⬅ GERİ</button>
  </div>
</div>

<script>
// Preload image
window.addEventListener('load', function() {
  var img = new Image();
  img.onload = function() {
    document.getElementById('bgImage').classList.add('loaded');
    var spinner = document.getElementById('loadingSpinner');
    if (spinner) spinner.style.display = 'none';
  };
  img.onerror = function() {
    var spinner = document.getElementById('loadingSpinner');
    if (spinner) spinner.style.display = 'none';
  };
  img.src = 'image.png';
});

// Prevent scrolling
document.addEventListener('touchmove', function(e) {
  if (e.target.closest('.overlay')) return;
  e.preventDefault();
}, { passive: false });

document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
}, { passive: false });

var cv = document.getElementById('c');
var ctx = cv.getContext('2d');
var ov = document.getElementById('ov');
var lvOv = document.getElementById('lv-ov');

var C = 11, R = 17, SZ = 34;
var W = 1, F = 0, G = 2, E = 3;
var lv = 1, sc = 0, gm = 0, tg = 0;
var px = 1, py = 1;
var grid = null, parts = [], ep = 0, anim = null;

var maxLv = parseInt(localStorage.getItem('kirpiMaxLv')) || 1;

var PAL = [
  {bg:'#e8f5e9',w:'#388e3c',wt:'#66bb6a',f:'#c8e6c9'},
  {bg:'#e3f2fd',w:'#1565c0',wt:'#42a5f5',f:'#bbdefb'},
  {bg:'#fff3e0',w:'#e65100',wt:'#ff8f00',f:'#ffe0b2'},
  {bg:'#fce4ec',w:'#880e4f',wt:'#e91e63',f:'#f8bbd0'}
];
var pal = PAL[0];

var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
}

function playBeep(freq, duration) {
  initAudio();
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  gain.gain.value = 0.1;
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function vib(type) {
  if (navigator.vibrate) {
    if (type === 'move') navigator.vibrate(10);
    else if (type === 'apple') navigator.vibrate(50);
    else if (type === 'door') navigator.vibrate([100, 50, 100]);
    else if (type === 'win') navigator.vibrate([200, 100, 200]);
  }
  if (type === 'move') playBeep(200, 0.02);
  else if (type === 'apple') playBeep(600, 0.1);
  else if (type === 'door') {
    playBeep(800, 0.15);
    setTimeout(function() { playBeep(1000, 0.15); }, 150);
  }
  else if (type === 'win') {
    playBeep(500, 0.1);
    setTimeout(function() { playBeep(700, 0.1); }, 100);
    setTimeout(function() { playBeep(900, 0.2); }, 200);
  }
}

function rsz() {
  var mid = document.querySelector('.mid');
  var w = mid.clientWidth;
  var h = mid.clientHeight;

  var szW = w / C;
  var szH = h / R;
  SZ = Math.min(szW, szH);

  var canvasW = Math.floor(SZ * C);
  var canvasH = Math.floor(SZ * R);

  cv.width = canvasW;
  cv.height = canvasH;

  cv.style.width = canvasW + 'px';
  cv.style.height = canvasH + 'px';
}

function makeGrid() {
  var g = [];
  for (var i = 0; i < R; i++) {
    g[i] = [];
    for (var j = 0; j < C; j++) g[i][j] = W;
  }
  return g;
}

function carveMaze(g) {
  var vis = [];
  for (var i = 0; i < R; i++) {
    vis[i] = [];
    for (var j = 0; j < C; j++) vis[i][j] = false;
  }

  function cr(x, y) {
    vis[y][x] = true;
    g[y][x] = F;
    var dirs = [[0,-2],[0,2],[-2,0],[2,0]];
    dirs.sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < 4; i++) {
      var nx = x + dirs[i][0], ny = y + dirs[i][1];
      if (nx >= 0 && nx < C && ny >= 0 && ny < R && !vis[ny][nx]) {
        g[y + dirs[i][1]/2][x + dirs[i][0]/2] = F;
        cr(nx, ny);
      }
    }
  }
  cr(1, 1);
}

function placeGems() {
  var fl = [];
  for (var y = 0; y < R; y++)
    for (var x = 0; x < C; x++)
      if (grid[y][x] === F && !(x===1&&y===1) && !(x===C-2&&y===R-2))
        fl.push([x, y]);
  fl.sort(function() { return Math.random() - 0.5; });
  var n = 0;
  for (var i = 0; i < fl.length && n < 3; i++) {
    grid[fl[i][1]][fl[i][0]] = G;
    n++;
  }
  return n;
}

function init() {
  pal = PAL[(lv - 1) % 4];
  grid = makeGrid();
  carveMaze(grid);
  grid[1][1] = F;
  grid[R-2][C-2] = F;
  tg = placeGems();
  gm = 0;
  parts = [];
  px = 1;
  py = 1;
  document.getElementById('lv').textContent = lv;
  hud();
}

function hud() {
  document.getElementById('sc').textContent = sc;
  document.getElementById('gm').textContent = gm + '/' + tg;
}

function move(dx, dy) {
  if (!grid) return;
  var nx = px + dx, ny = py + dy;
  if (nx < 0 || nx >= C || ny < 0 || ny >= R) return;
  var cell = grid[ny][nx];
  if (cell === W) return;
  px = nx; py = ny;
  vib('move');
  if (cell === G) {
    grid[ny][nx] = F;
    gm++; sc += 100;
    vib('apple');
    for (var i = 0; i < 8; i++) {
      var a = Math.PI * 2 / 8 * i;
      parts.push({x: nx*SZ+SZ/2, y: ny*SZ+SZ/2, vx: Math.cos(a)*2.5, vy: Math.sin(a)*2.5, l: 1});
    }
    if (gm === tg) {
      grid[R-2][C-2] = E;
      vib('door');
      for (var j = 0; j < 12; j++) {
        var a2 = Math.PI * 2 / 12 * j;
        parts.push({x: (C-2)*SZ+SZ/2, y: (R-2)*SZ+SZ/2, vx: Math.cos(a2)*3, vy: Math.sin(a2)*3, l: 1.5});
      }
    }
    hud();
  }
  if (cell === E) {
    sc += 200 + gm * 50;
    lv++;
    if(lv > maxLv) {
      maxLv = lv;
      localStorage.setItem('kirpiMaxLv', maxLv);
    }
    vib('win');
    setTimeout(win, 300);
  }
}

function win() {
  ov.innerHTML = '<img src="image.png" id="bgImage" class="loaded" alt="" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;">' +
    '<div class="btn-container">' +
    '<h2 style="color:#f5a623;font-size:14px;margin:0 0 8px 0;text-align:center;text-shadow:3px 3px 0px #7a5010;letter-spacing:2px;">🎉 AFERİN!</h2>' +
    '<p style="color:#fff;font-size:6px;text-align:center;line-height:1.8;margin:0 0 8px 0;letter-spacing:0.5px;">BÖLÜM ' + (lv-1) + ' BİTTİ!<br>PUAN: ' + sc + '</p>' +
    '<button id="sb" class="btn btn-blue" style="width:280px;height:50px;margin:0;">▶ DEVAM</button>' +
    '<button id="lb" class="btn btn-blue">📋 BÖLÜMLER</button>' +
    '</div>';
  ov.classList.add('active');
  document.getElementById('sb').onclick = go;
  document.getElementById('lb').onclick = openLevels;
}

function go() {
  initAudio();
  ov.classList.remove('active');
  lvOv.classList.remove('active');
  rsz();
  init();
  if (!anim) loop();
}

function openLevels() {
  ov.classList.remove('active');
  lvOv.classList.add('active');
  var cont = document.getElementById('lv-container');
  cont.innerHTML = '';
  for(var i=1; i<=30; i++) {
    var btn = document.createElement('button');
    btn.className = 'lv-btn ' + (i <= maxLv ? 'lv-unlocked' : 'lv-locked');
    btn.textContent = i <= maxLv ? i : '🔒';
    if(i <= maxLv) {
      btn.onclick = (function(lvl) {
        return function() { lv = lvl; sc = 0; go(); }
      })(i);
    }
    cont.appendChild(btn);
  }
}

document.getElementById('startBtn').onclick = go;
document.getElementById('lb').onclick = openLevels;
document.getElementById('rb').onclick = function() {
  if (confirm('Tüm ilerleme silinecek! Emin misin?')) {
    localStorage.removeItem('kirpiMaxLv');
    maxLv = 1; lv = 1; sc = 0;
    alert('Sıfırlandı! Oyun yeniden başlıyor...');
    location.reload();
  }
};

document.getElementById('lv-back').onclick = function() {
  lvOv.classList.remove('active');
  ov.classList.add('active');
};

function drawCell(x, y, cell) {
  var px2 = x * SZ;
  var py2 = y * SZ;
  if (cell === W) {
    ctx.fillStyle = pal.w;
    ctx.fillRect(px2, py2, SZ, SZ);
    ctx.fillStyle = pal.wt;
    ctx.fillRect(px2+2, py2+2, SZ-4, Math.max(4, SZ*0.17));
  } else {
    ctx.fillStyle = pal.f;
    ctx.fillRect(px2, py2, SZ, SZ);
  }
  if (cell === G) {
    var s = 0.9 + 0.1*Math.sin(Date.now()/400+x+y);
    ctx.save();
    ctx.translate(px2+SZ/2, py2+SZ/2);
    ctx.scale(s, s);
    ctx.fillStyle='#e53935';
    ctx.beginPath();
    ctx.arc(0, SZ*0.05, SZ*0.25, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#388e3c';
    ctx.fillRect(-SZ*0.05, -SZ*0.25, SZ*0.1, SZ*0.2);
    ctx.restore();
  }
  if (cell === E) {
    ctx.fillStyle = 'rgba(255,214,0,'+(0.65+0.3*Math.sin(ep*Math.PI*2))+')';
    ctx.beginPath();
    ctx.roundRect(px2+3, py2+3, SZ-6, SZ-6, 5);
    ctx.fill();
    ctx.font = (SZ*0.52)+'px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🚪', px2+SZ/2, py2+SZ/2+1);
  }
}

function drawKirpi() {
  var cx = px*SZ+SZ/2, cy = py*SZ+SZ/2, s = SZ/38;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  ctx.fillStyle='#795548';
  ctx.beginPath();
  ctx.ellipse(0, 2, 13, 9, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#4e342e';
  ctx.lineWidth=2;
  var sp=[[0,-13],[5,-12],[-5,-12],[8,-9],[-8,-9],[11,-5],[-11,-5]];
  for(var i=0;i<sp.length;i++){
    ctx.beginPath();
    ctx.moveTo(sp[i][0]*0.3, sp[i][1]*0.3);
    ctx.lineTo(sp[i][0], sp[i][1]);
    ctx.stroke();
  }
  ctx.fillStyle='#d7ccc8';
  ctx.beginPath();
  ctx.ellipse(6, 2, 7, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.arc(10, 0, 2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(11, -0.5, 0.7, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#e91e63';
  ctx.beginPath();
  ctx.arc(13, 2, 1.4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function loop(ts) {
  ts = ts || 0;
  ep = (ts / 2000) % 1;
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, cv.width, cv.height);
  if (grid) {
    for (var y = 0; y < R; y++)
      for (var x = 0; x < C; x++)
        drawCell(x, y, grid[y][x]);
  }
  for (var i = parts.length-1; i >= 0; i--) {
    var p = parts[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.l -= 0.04;
    if (p.l <= 0) {
      parts.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.l;
    ctx.fillStyle = '#f5a623';
    ctx.beginPath();
    ctx.arc(p.x, p.y, SZ*0.13*p.l, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (grid) drawKirpi();
  anim = requestAnimationFrame(loop);
}

document.addEventListener('keydown', function(e) {
  var m = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if (m[e.key]) {
    e.preventDefault();
    move(m[e.key][0], m[e.key][1]);
  }
});

var swipeStartX = 0, swipeStartY = 0;
document.addEventListener('touchstart', function(e) {
  if (e.target.closest('.overlay')) return;
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (e.target.closest('.overlay')) return;
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  var absDx = Math.abs(dx);
  var absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 20) return;
  if (absDx > absDy) {
    move(dx > 0 ? 1 : -1, 0);
  } else {
    move(0, dy > 0 ? 1 : -1);
  }
}, { passive: true });

var mouseStartX = 0, mouseStartY = 0, mouseDown = false;
document.addEventListener('mousedown', function(e) {
  if (e.target.closest('.overlay')) return;
  mouseDown = true;
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
});

document.addEventListener('mouseup', function(e) {
  if (!mouseDown) return;
  if (e.target.closest('.overlay')) return;
  mouseDown = false;
  var dx = e.clientX - mouseStartX;
  var dy = e.clientY - mouseStartY;
  var absDx = Math.abs(dx);
  var absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 10) return;
  if (absDx > absDy) {
    move(dx > 0 ? 1 : -1, 0);
  } else {
    move(0, dy > 0 ? 1 : -1);
  }
});

document.addEventListener('mouseleave', function() {
  mouseDown = false;
});

window.addEventListener('resize', function() {
  if (!ov.classList.contains('active') && !lvOv.classList.contains('active')) {
    rsz();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(function() {});
}

ov.classList.add('active');
rsz();
</script>
